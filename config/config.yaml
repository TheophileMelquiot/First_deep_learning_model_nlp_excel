# Configuration for Column Classification Model
# All hyperparameters and settings are centralized here for reproducibility

seed: 42

# Data settings
data:
  num_samples_per_class: 500
  num_classes: 8
  max_values_per_column: 10
  val_ratio: 0.15
  test_ratio: 0.15
  class_labels:
    - email
    - phone
    - price
    - id
    - date
    - name
    - address
    - categorical

# Model settings
model:
  transformer_name: "distilbert-base-uncased"
  transformer_hidden_size: 768
  feature_hidden_size: 64
  fusion_hidden_size: 256
  num_stat_features: 4    # n_unique, entropy, null_ratio, mean_length
  num_pattern_features: 6 # is_email, is_phone, is_numeric, is_date, has_at, has_dot
  dropout: 0.3
  freeze_transformer: false

# Training settings
training:
  batch_size: 32
  learning_rate: 2.0e-5
  weight_decay: 0.01
  num_epochs: 20
  max_seq_length: 128
  patience: 5            # early stopping patience
  min_delta: 0.001       # minimum improvement for early stopping

# Evaluation settings
evaluation:
  metrics:
    - accuracy
    - f1_macro
    - roc_auc
